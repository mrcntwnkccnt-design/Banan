name: Build BananaInjector (Windows)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake (VS 2022 x64)
        run: |
          cmake -S bananainjector_src -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: |
          cmake --build build --config Release --parallel 2

      - name: Collect artifact
        uses: actions/upload-artifact@v4
        with:
          name: bananainjector-exe
          path: build/Release/bananainjector.exe
